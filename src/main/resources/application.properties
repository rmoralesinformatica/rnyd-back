
spring.application.name=NutricionYDeporte
server.port=8080


spring.datasource.url=jdbc:postgresql://localhost:5432/PRUEBA45
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=false


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=true
spring.jpa.hibernate.ddl-auto=none


spring.webflux.cors.allowed-origins=*
spring.webflux.cors.allowed-methods=*
spring.webflux.cors.allowed-headers=*
spring.webflux.cors.allow-credentials=true


spring.jackson.date-format=yyyy-MM-dd


logging.level.com.rnyd.rnyd.service.signInService.SignInService=INFO
logging.level.root=DEBUG


security.secret-key=claveSuperSecreta123456

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
